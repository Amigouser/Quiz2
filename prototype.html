<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Живая клетка</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="components.css"/>
<style>
  /* Плавные переходы между экранами */
  .screen-enter {
    animation: screen-in 280ms cubic-bezier(0.22, 0.8, 0.32, 1) both;
  }
  @keyframes screen-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Полноэкранный layout */
  html, body, #root { height: 100%; }
  #root { display: flex; flex-direction: column; }
</style>
</head>
<body data-theme="light" data-accent="amber" data-density="cozy" data-cards="shadow">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Компоненты (порядок важен: botanical → screens) -->
<script type="text/babel" src="botanical.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/login.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/dashboard.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/quiz.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/admin.jsx" data-presets="react"></script>

<script type="text/babel" data-presets="react">
// ── Интерактивный прототип — навигация между экранами ──

function App() {
  const [screen, setScreen]       = React.useState("login");
  const [prevScreen, setPrev]     = React.useState(null);
  const [userName, setUserName]   = React.useState("");
  const [currentQuiz, setCurrentQuiz] = React.useState(null);
  const [quizAnswers, setQuizAnswers] = React.useState([]);
  const [renderKey, setRenderKey] = React.useState(0); // для анимации при смене экрана

  const nav = (to, extra = {}) => {
    setPrev(screen);
    setRenderKey(k => k + 1);
    if (extra.name) setUserName(extra.name);
    if (extra.quiz !== undefined) setCurrentQuiz(extra.quiz);
    if (extra.answers !== undefined) setQuizAnswers(extra.answers);
    setScreen(to);
  };

  // Формируем объект квиза для QuizClassic из карточки дашборда
  const buildQuiz = (dashQ) => {
    const base = window.SAMPLE_QUIZ || { title: dashQ.title, topic: dashQ.topic, questions: [] };
    return { ...base, title: dashQ.title, topic: dashQ.topic };
  };

  const content = (() => {
    switch (screen) {

      // ── Вход ──
      case "login":
        return (
          <LoginCompact
            onEnter={(name) => nav("dashboard", { name })}
          />
        );

      // ── Дашборд ученика ──
      case "dashboard":
        return (
          <StudentDashboard
            name={userName || "Аня"}
            onOpenQuiz={(q) => nav("quiz", { quiz: buildQuiz(q) })}
            onAdmin={() => nav("admin")}
          />
        );

      // ── Прохождение теста ──
      case "quiz":
        return (
          <QuizClassic
            quiz={currentQuiz || undefined}
            onFinish={(answers) => nav("results", { answers })}
            onExit={() => nav("dashboard")}
          />
        );

      // ── Результат ──
      case "results": {
        const total   = quizAnswers.length || 4;
        const correct = quizAnswers.filter(a => a.correct).length;
        return (
          <QuizResults
            total={total}
            correct={correct}
            onRetry={() => nav("quiz")}
            onHome={() => nav("dashboard")}
          />
        );
      }

      // ── Админ-панель ──
      case "admin":
        return (
          <div style={{ minHeight: "100vh", background: "var(--bg)" }}>
            {/* Шапка с кнопкой назад */}
            <div style={{
              padding: "10px 24px",
              borderBottom: "1px solid var(--border-soft)",
              background: "var(--surface)",
              display: "flex",
              alignItems: "center",
              gap: 12,
            }}>
              <button
                className="btn btn-ghost btn-sm"
                onClick={() => nav("dashboard")}
              >
                ← К дашборду
              </button>
            </div>
            <AdminPanel />
          </div>
        );

      default:
        return null;
    }
  })();

  return (
    <div key={renderKey} className="screen-enter" style={{ flex: 1 }}>
      {content}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
